<div class="container m-2">
    <div class="card p-2">
        <header>View Child Example</header>
        <hr>
        <div class="row mt-2">
            <div class="col-md-2">
                <input type="text" #name class="form-control" placeholder="Enter Name">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary" (click)="focus(name)">Focus</button>
            </div>
        </div>
    </div>
</div>

<div class="container m-2">
    <div class="card p-2">
        <app-view-children></app-view-children>
        <button class="btn btn-primary" (click)="callChild()">Call Child</button>
        
    </div>
</div>
