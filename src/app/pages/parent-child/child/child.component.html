<div class="container">
    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Name</th>
                    <th scope="col">Class</th>
                    <th scope="col">Result</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let data of studentData">
                    <td>{{data.id}}</td>
                    <td>{{data.name}}</td>
                    <td>{{data.class}}</td>
                    <td>{{data.result}}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
