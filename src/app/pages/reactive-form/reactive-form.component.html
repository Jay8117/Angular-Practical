<div class="container">
    <div class="card">
        <form [formGroup]="empForm" (ngSubmit)="submit()">
            <div class="col-md-12">
                <div class="row">
                    <div class="col-md-3">
                        <label for="name">Name*</label>
                        <input type="text" class="form-control" placeholder="Enter Name" formControlName="name">
                        <div *ngIf="empForm.get('name')?.touched">
                            <small *ngIf="empForm.get('name')?.errors?.['required']">
                                This field is required
                            </small>
                            <small *ngIf="empForm.get('name')?.errors?.['pattern']">
                                Only Alphabet are required
                            </small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label for="email">Email*</label>
                        <input type="text" class="form-control" placeholder="Enter Email" formControlName="email">
                        <div *ngIf="empForm.get('email')?.touched">
                            <small *ngIf="empForm.get('email')?.errors?.['required']">
                                This field is required
                            </small>
                            <small *ngIf="empForm.get('email')?.errors?.['email']">
                                Please enter valid email
                            </small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label for="skill">Skill*</label>
                        <input type="text" class="form-control" placeholder="Enter Skill" formControlName="skill">
                        <div *ngIf="empForm.get('skill')?.touched">
                            <small *ngIf="empForm.get('skill')?.errors?.['required']">
                                This field is required
                            </small>
                            <small *ngIf="empForm.get('skill')?.errors?.['invalidSkill']">
                                Skill Must be 'Angular'
                            </small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label for="salary">Salary Expectation</label>
                        <input type="text" class="form-control" placeholder="Enter Salary" formControlName="salary">
                        <div *ngIf="empForm.get('salary')?.touched">
                            <small *ngIf="empForm.get('salary')?.errors?.['minlength']">
                                Min 5 digit required
                            </small>
                            <small *ngIf="empForm.get('salary')?.errors?.['maxlength']">
                                max 7 digit required
                            </small>
                        </div>
                    </div>
                </div>

                
                <div class="row">
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-success">Update</button>
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-danger">Delete</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
