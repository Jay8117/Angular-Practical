<app-children (dataItem)="getData($event)"></app-children>

<div class="container">
    <header>Parent Component</header>
    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">First</th>

                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of userDataTable;let i=index">
                    <th scope="row">{{i+1}}</th>
                    <td>{{item.name}}</td>

                </tr>
            </tbody>
        </table>
    </div>
</div>
